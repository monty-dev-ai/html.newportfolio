<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Hobbies</title>
    <style>
      body {
        margin: 0;
        background: linear-gradient(to left, pink, purple, yellow);
        font-family: Arial, sans-serif;
        padding: 5px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }

      h1 {
        background-color: rgb(242, 17, 250);
        padding: 15px;
        border-radius: 15px;
        display: inline-block;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        background: white;
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hobbies</h1>
      <ul>
        <li>Coding personal projects</li>
        <li>Learning new web technologies</li>
        <li>Watching tech videos</li>
        <li>Playing online games</li>
        <li>Listening to music</li>
        <li>Reading about startups & innovation</li>
      </ul>
    </div>
  </body>
</html>
